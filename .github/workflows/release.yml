name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional release version guard without leading v; must match VERSION.
        required: false
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  version:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve version
        id: version
        shell: bash
        run: |
          canonical_version="$(tr -d '[:space:]' < VERSION)"
          requested_version="${{ github.event.inputs.version }}"
          if [ -z "$requested_version" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            requested_version="${GITHUB_REF_NAME#v}"
          fi
          if [ -n "$requested_version" ] && [ "$requested_version" != "$canonical_version" ]; then
            echo "Release version '$requested_version' does not match VERSION '$canonical_version'. Update VERSION first." >&2
            exit 1
          fi
          echo "version=$canonical_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$canonical_version" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Build, verify, and package
        shell: cmd
        run: gradlew.bat clean check corePerformance verifyPlugin buildPlugin "-PpluginVersion=${{ needs.version.outputs.version }}" -PverifyRecommendedIdes=false -PverifyAllJetBrainsIdes=false --no-daemon --console=plain --no-build-cache --rerun-tasks

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: idea-plugin
          path: |
            build/distributions/MarkdownTableEditorIdea-${{ needs.version.outputs.version }}.zip
            build/release/MARKETPLACE_SUBMISSION.md
          if-no-files-found: error

  release:
    needs:
      - version
      - build
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets

      - name: Generate release checksums
        shell: bash
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mapfile -t files < <(find release-assets -type f -name '*.zip' | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release ZIP files were downloaded." >&2
            exit 1
          fi

          timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          sbom_file="release-assets/MarkdownTableEditorIdea-$VERSION-sbom.cdx.json"
          cat > "$sbom_file" <<EOF
          {
            "bomFormat": "CycloneDX",
            "specVersion": "1.6",
            "version": 1,
            "metadata": {
              "timestamp": "$timestamp",
              "component": {
                "type": "application",
                "name": "IdeaMarkdownTableEditor",
                "version": "$VERSION",
                "purl": "pkg:github/krotname/IdeaMarkdownTableEditor@v$VERSION"
              }
            }
          }
          EOF

          marketplace_doc="$(find release-assets -type f -name 'MARKETPLACE_SUBMISSION.md' | sort | head -n 1)"
          checksum_files=("${files[@]}" "$sbom_file")
          if [ -n "$marketplace_doc" ]; then
            checksum_files+=("$marketplace_doc")
          fi

          sha256sum "${checksum_files[@]}" > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate release provenance attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: |
            release-assets/**/*.zip
            release-assets/**/*-sbom.cdx.json
      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mapfile -t files < <(find release-assets -type f \( -name '*.zip' -o -name '*-sbom.cdx.json' \) | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release ZIP files were downloaded." >&2
            exit 1
          fi

          marketplace_doc="$(find release-assets -type f -name 'MARKETPLACE_SUBMISSION.md' | sort | head -n 1)"
          cat > release-notes.md <<EOF
          ## Builds / Downloads

          - [MarkdownTableEditorIdea-$VERSION.zip](https://github.com/krotname/IdeaMarkdownTableEditor/releases/download/v$VERSION/MarkdownTableEditorIdea-$VERSION.zip)
          - [MarkdownTableEditorIdea-$VERSION-sbom.cdx.json](https://github.com/krotname/IdeaMarkdownTableEditor/releases/download/v$VERSION/MarkdownTableEditorIdea-$VERSION-sbom.cdx.json)
          - [SHA256SUMS.txt](https://github.com/krotname/IdeaMarkdownTableEditor/releases/download/v$VERSION/SHA256SUMS.txt)
          - [MARKETPLACE_SUBMISSION.md](https://github.com/krotname/IdeaMarkdownTableEditor/releases/download/v$VERSION/MARKETPLACE_SUBMISSION.md)

          ## What's Changed

          - Fixed Power Auto Fit so typing in lower sparse or continuation rows keeps the caret in the edited row instead of jumping back to the second row.
          - Prevented pending auto-fit timers from overriding manual plugin edits such as Align, Narrow Column, and Widen Column.
          - Kept Java/C++ core behavior in sync for continuation-row reflow, manual column resizing, caret placement, escaped pipes, and Unicode/CJK width handling.
          - Rebuilt the plugin ZIP with SHA-256 sums, SBOM, and GitHub attestations.

          ## Validation

          - GitHub Actions release build completed with tests, coverage checks, baseline Plugin Verifier, and core performance benchmarks.
          EOF

          assets=("${files[@]}" SHA256SUMS.txt)
          if [ -n "$marketplace_doc" ]; then
            assets+=("$marketplace_doc")
          fi

          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --title "Markdown Table Editor $VERSION" --notes-file release-notes.md --latest
          else
            gh release create "$TAG_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "Markdown Table Editor $VERSION" --notes-file release-notes.md --latest
          fi
